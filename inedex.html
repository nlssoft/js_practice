<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ewp</title>

    <style>

        .controlers{
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 45px;
        }

        
        .js-input{
            flex: 2;
            height: 34px;
            padding: 0px 14px;
            border-radius: 20px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
            transition: all 0.2s ease;

        }

        .js-input:hover {
            border-color: #bbb;
            }

        .js-input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 6px rgba(74, 144, 226, 0.3);
        }


        .js-button{
            flex: 1;
            font-size: 18px;

            height: 35px;
            padding: 0px 14px;
            
            border-radius: 20px;
            border: 1px solid #ddd;
   
            color: black;
            background: white;

            cursor: pointer;
            transition: all 0.2s ease;
            
        }

        .js-button:hover {
            background: #4a90e2;
            color: white;
            border-color: #4a90e2;
        }

        .js-button:active {
            transform: scale(0.96);
        }

        .header {
            font-weight: bold;
            background: #f3f6fb;
            border: 1px solid #dbe4f0;
        }

        .header span {
            color: #4a90e2;

        }

        .header:hover {
            transform: none;
            background: #f3f6fb;
        }


        .row {
            display: grid;
            grid-template-columns: 60px 1fr 1fr 1fr auto;
            align-items: center;
            text-align: center;
            padding: 12px 20px;
            margin: 10px auto;
            width: 70%;
            border-radius: 12px;
            border: 1px solid #e5e5e5;
            background: white;
        }

        .row span{
            flex: 1;
            text-align: center;
            font-weight: 500;
            color: #333;

        }

        .row span:nth-child(2){
            font-weight: bold;
            color: #4a90e2;
        }

        .row:hover {
            background: #f9f9f9;
            transform: translateY(-2px);
            transition: 0.2s ease;
        }

        .d-button{
            padding: 4px 10px;
            border: 1px solid #bbb;
            border-radius: 6px;
            background: white;
            cursor: pointer;
         }

                    
    </style>


</head>


<body>

    <form class="controlers" onsubmit="handleSubmit(event)">
    <input class="js-input" placeholder="Enter weight after 136. ">
    <button class="js-button" type="submit">Get results </button>
    <button class="js-button" type="button" onclick="clearAll()">Empty memory</button>
    </form>

    <div class="row header">
        <span>#</span>
        <span>weight</span>
        <span>Result</span>
        <span>Purity</span>
        <span>Action</span>
    </div>


    <div class="js-output"></div>
    

    <script>

        function handleSubmit(event) {
            event.preventDefault(); // stop page refresh
            sorter();
        }

        function clearAll(){
            numbers.length = 0;
            localStorage.removeItem('numbers');
            document.querySelector('.js-output').innerHTML = '';
            document.querySelector('.js-input').value = '';
        }

        function deleteRow(i){
            numbers.splice(i, 1);
            localStorage.setItem('numbers', JSON.stringify(numbers));
            sorter();
        }


        const numbers = JSON.parse(
            localStorage.getItem('numbers')) || []

        function addNum(){
            const inputElement = document.querySelector('.js-input');
            let value = inputElement.value.trim();
            if (value === "") return;

            if (isNaN(value)) {
                alert("Only numeric values allowed.");
                return;
            }

            value = Number(`136.`+ value);
            numbers.push(value);
            localStorage.setItem('numbers', JSON.stringify(numbers));
            inputElement.value = '';
        } 

        function sorter(){
            addNum()
            const results = [];
            const purities = [];
            let rhtml = ''; 
            const array = [916.9, 917.0, 917.1, 917.2, 917.3] 

            for (let i = 0; i < numbers.length; i++){
                let num = numbers[i]
                const num0 = num
                const randominx = Math.floor(Math.random() * array.length)
                const purity = array[randominx]
                purities.push(purity)

                const r = num * purity;
                const scaled = r / 1000;

                const rounded = Math.floor(scaled * 1000) / 1000;
                results.push(rounded)
                const html = `<div class= 'row'>
                    <span>${i + 1}</span>
                     <span>${num0}</span> 
                     <span>${rounded}</span> 
                     <span>${purity}</span>
                     <span> <button 
                        class='d-button', 
                        onclick= "deleteRow(${i})" 
                        >Delete</button>
                     <span>
                </div>`;

                rhtml += html;

            }
            document.querySelector('.js-output')
                .innerHTML = rhtml;

        }


    </script>
    
</body>
</html>
